# Render Configuration File
# Place this in your repo root for auto-detection
# Docs: https://render.com/docs/deploys#deploy-from-a-git-repo

services:
  - type: web
    name: solvara-technologies
    runtime: node
    plan: free

    # Build settings
    buildCommand: npm install && npm run build

    # Serve the static build with serve package
    startCommand: npx serve dist -s -l 10000

    # Environment variables (optional)
    envVars:
      - key: NODE_ENV
        value: production

    # Auto-deploy on push to main branch
    branch: main

    # Number of instances (free tier = 1)
    numInstances: 1

    # Health check path
    healthCheckPath: /
